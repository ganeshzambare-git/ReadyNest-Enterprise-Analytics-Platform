<script>
    const parentDoc = window.parent.document;
    setInterval(() => {
        const links = parentDoc.querySelectorAll('.nav-link:not(.bound)');
        links.forEach(el => {
            el.classList.add('bound');
            el.addEventListener('click', (e) => {
                e.preventDefault();
                const title = el.getAttribute('data-title');
                
                const sidebar = parentDoc.querySelector('[data-testid="stSidebar"]');
                if (sidebar) {
                    const sidebarLinks = sidebar.querySelectorAll('a');
                    let found = false;
                    for (let i = 0; i < sidebarLinks.length; i++) {
                        // Match exactly by text content (ignoring surrounding spaces or emojis)
                        if (sidebarLinks[i].textContent.includes(title)) {
                            sidebarLinks[i].click();
                            found = true;
                            break;
                        }
                    }
                    if (!found) {
                        console.log('Could not find hidden sidebar link for: ' + title);
                        alert('Could not navigate to: ' + title + '. Ensure you are authenticated and the sidebar contains this module.');
                    }
                } else {
                    console.log('Sidebar not found in DOM.');
                }
            });
        });
    }, 1000);
</script>
